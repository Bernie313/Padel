<script>
/* ============ SCHEDULER (validado: 8j perfecto, 9j óptimo) ============ */
function mulberry32(seed){return function(){seed|=0;seed=(seed+0x6D2B79F5)|0;let t=Math.imul(seed^(seed>>>15),1|seed);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
function shuffle(arr,rnd){for(let i=arr.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function emptyMatrix(n){return Array.from({length:n},()=>new Array(n).fill(0));}
function buildOnce(n,rounds,rnd){
  const courts=Math.floor(n/4),playing=courts*4,sitPerRound=n-playing;
  const partner=emptyMatrix(n),opp=emptyMatrix(n),rest=new Array(n).fill(0),schedule=[];
  for(let r=0;r<rounds;r++){
    let players=shuffle([...Array(n).keys()],rnd);
    players.sort((a,b)=>rest[a]-rest[b]);
    const sitting=players.slice(0,sitPerRound),active=players.slice(sitPerRound);
    sitting.forEach(p=>rest[p]++);
    const avail=shuffle([...active],rnd),pairs=[],used=new Set();
    while(avail.length){
      const a=avail.find(x=>!used.has(x)); if(a===undefined)break; used.add(a);
      let best=null,bestCost=Infinity;
      for(const b of avail){if(used.has(b)||b===a)continue;const cost=partner[a][b]*100+opp[a][b];if(cost<bestCost){bestCost=cost;best=b;}}
      used.add(best); pairs.push([a,best]);
    }
    const courtList=[],usedPairs=new Set();
    for(let i=0;i<pairs.length;i++){
      if(usedPairs.has(i))continue; usedPairs.add(i);
      let best=-1,bestCost=Infinity;
      for(let j=0;j<pairs.length;j++){
        if(usedPairs.has(j)||j===i)continue;
        const[a,b]=pairs[i],[c,d]=pairs[j];
        const cost=opp[a][c]+opp[a][d]+opp[b][c]+opp[b][d];
        if(cost<bestCost){bestCost=cost;best=j;}
      }
      if(best===-1)break; usedPairs.add(best); courtList.push([pairs[i],pairs[best]]);
    }
    const roundMatches=[];
    for(const[t1,t2]of courtList){
      partner[t1[0]][t1[1]]++;partner[t1[1]][t1[0]]++;partner[t2[0]][t2[1]]++;partner[t2[1]][t2[0]]++;
      for(const x of t1)for(const y of t2){opp[x][y]++;opp[y][x]++;}
      roundMatches.push({teamA:t1,teamB:t2,scoreA:null,scoreB:null});
    }
    schedule.push({matches:roundMatches,resting:sitting});
  }
  return{schedule,partner,opp,rest};
}
function scoreOf(n,res){
  const{partner,opp,rest}=res;let s=0,pVals=[];
  for(let i=0;i<n;i++)for(let j=i+1;j<n;j++)pVals.push(partner[i][j]);
  const pIdeal=pVals.reduce((a,b)=>a+b,0)/pVals.length;
  for(const v of pVals)s+=Math.pow(v-pIdeal,2)*50+(v>1?(v-1)*200:0);
  let oVals=[];for(let i=0;i<n;i++)for(let j=i+1;j<n;j++)oVals.push(opp[i][j]);
  const oIdeal=oVals.reduce((a,b)=>a+b,0)/oVals.length;
  for(const v of oVals)s+=Math.pow(v-oIdeal,2)*5;
  const rIdeal=rest.reduce((a,b)=>a+b,0)/n;
  for(const v of rest)s+=Math.pow(v-rIdeal,2)*30;
  return s;
}
function generateSchedule(n,rounds,opts={}){
  const restarts=opts.restarts||4000;let seedBase=opts.seed||(Date.now()%100000);
  let best=null,bestScore=Infinity;
  for(let k=0;k<restarts;k++){
    const rnd=mulberry32(seedBase+k*2654435761);
    const res=buildOnce(n,rounds,rnd);const sc=scoreOf(n,res);
    if(sc<bestScore){bestScore=sc;best=res;}
    if(bestScore===0)break;
  }
  return{schedule:best.schedule,score:bestScore};
}
function defaultRounds(n){const m={4:3,5:5,6:5,7:7,8:7,9:9,10:9,11:11,12:11};return m[n]||n-1;}
function defaultPoints(n){return n===9?20:24;}

/* ============ ALMACENAMIENTO: TORNEOS ============ */
const KEY='padel_americano_torneos';
function loadAll(){try{return JSON.parse(localStorage.getItem(KEY))||[];}catch(e){return[];}}
function saveAll(list){localStorage.setItem(KEY,JSON.stringify(list));}
function saveTournament(t){const list=loadAll();const i=list.findIndex(x=>x.id===t.id);if(i>=0)list[i]=t;else list.unshift(t);saveAll(list);cloudPushTournament(t);}
function deleteTournament(id){saveAll(loadAll().filter(t=>t.id!==id));cloudDeleteTournament(id);}

/* ============ ALMACENAMIENTO: JUGADORES (roster) ============ */
const ROSTER_KEY='padel_americano_jugadores';
function loadRoster(){try{return JSON.parse(localStorage.getItem(ROSTER_KEY))||[];}catch(e){return[];}}
function saveRoster(list){localStorage.setItem(ROSTER_KEY,JSON.stringify(list));}
function uid(){return 'pl'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function findRosterByName(nm){return loadRoster().find(p=>p.name.trim().toLowerCase()===nm.trim().toLowerCase());}
function addRosterPlayer(nm){
  nm=nm.trim(); if(!nm)return null;
  const ex=findRosterByName(nm); if(ex)return ex;
  const r=loadRoster();const p={id:uid(),name:nm};r.push(p);saveRoster(r);cloudPushRoster();return p;
}
function renameRosterPlayer(id,nm){
  nm=(nm||'').trim();if(!nm)return;
  const r=loadRoster(),p=r.find(x=>x.id===id);if(p){p.name=nm;saveRoster(r);}
  const list=loadAll();const changedT=[];
  list.forEach(t=>{let ch=false;if(t.playerIds)t.playerIds.forEach((pid,idx)=>{if(pid===id&&t.players[idx]!==nm){t.players[idx]=nm;ch=true;}});if(ch)changedT.push(t);});
  if(changedT.length)saveAll(list);
  cloudPushRoster();changedT.forEach(t=>cloudPushTournament(t));
}
function deleteRosterPlayer(id){saveRoster(loadRoster().filter(p=>p.id!==id));cloudPushRoster();}
function playerUsed(id){return loadAll().some(t=>(t.playerIds||[]).includes(id));}

/* Migración: torneos viejos (solo nombres) se vinculan a jugadores del roster */
function migrate(){
  const list=loadAll();let changed=false;
  list.forEach(t=>{
    if(!t.playerIds){
      t.playerIds=t.players.map(nm=>{const p=addRosterPlayer(nm);return p?p.id:null;});
      changed=true;
    }
  });
  if(changed)saveAll(list);
}

/* ============ RANKING (estilo FIP, por posición) ============ */
const POS_POINTS=[100,85,72,60,50,42,35,28,22,17,13,10]; // 1º..12º
function posPoints(pos){return pos>=1&&pos<=POS_POINTS.length?POS_POINTS[pos-1]:5;}
function isComplete(t){return t.schedule.length>0 && t.schedule.every(rd=>rd.matches.every(m=>m.scoreA!=null));}
// Asigna posición y puntos a una tabla ya ordenada; empates exactos comparten posición y promedian puntos
function assignPositions(st){
  const out=[];let i=0;
  while(i<st.length){
    let j=i;
    while(j+1<st.length && st[j+1].pts===st[i].pts && st[j+1].dif===st[i].dif)j++;
    let sum=0;for(let k=i;k<=j;k++)sum+=posPoints(k+1);
    const avg=Math.round(sum/(j-i+1)*10)/10, position=i+1;
    for(let k=i;k<=j;k++)out.push({...st[k],position,posPoints:avg});
    i=j+1;
  }
  return out;
}
function computeRanking(){
  const roster=loadRoster(),stats={};
  roster.forEach(p=>stats[p.id]={id:p.id,name:p.name,pts:0,tournaments:0,titles:0,amer:0,bestPos:99,results:[]});
  loadAll().slice().reverse().forEach(t=>{ // del más viejo al más nuevo
    if(!isComplete(t)||!t.playerIds)return;
    assignPositions(computeStandings(t)).forEach(row=>{
      const id=t.playerIds[row.i];if(!id||!stats[id])return;
      const s=stats[id];
      s.pts+=row.posPoints;s.amer+=row.pts;s.tournaments++;
      if(row.position===1)s.titles++;
      if(row.position<s.bestPos)s.bestPos=row.position;
      s.results.push({name:t.name,date:t.createdAt,position:row.position,posPoints:row.posPoints,amer:row.pts,np:t.numPlayers});
    });
  });
  return Object.values(stats).filter(s=>s.tournaments>0)
    .sort((a,b)=>b.pts-a.pts||b.titles-a.titles||a.bestPos-b.bestPos||a.name.localeCompare(b.name));
}

/* ============ SINCRONIZACIÓN EN LA NUBE (Firebase) ============ */
const FIREBASE_CONFIG = {
  apiKey:"AIzaSyCJPfhRmtHfKYgWb8fZnrMLxIbQ3RbBBQg",
  authDomain:"padel-molinos.firebaseapp.com",
  projectId:"padel-molinos",
  storageBucket:"padel-molinos.firebasestorage.app",
  messagingSenderId:"156684093614",
  appId:"1:156684093614:web:e33bf85d811f86c206453f"
};
const GROUP_KEY='padel_group_code';
let db=null, cloudOn=false, cloudUnsub=[];
function groupCode(){return localStorage.getItem(GROUP_KEY)||'';}
function cloudReady(){return typeof firebase!=='undefined' && !!FIREBASE_CONFIG.projectId;}
function cloudInit(){
  if(!cloudReady())return false;
  try{
    if(!firebase.apps.length){
      firebase.initializeApp(FIREBASE_CONFIG);
      try{firebase.firestore().enablePersistence({synchronizeTabs:true}).catch(()=>{});}catch(e){}
    }
    db=firebase.firestore();return true;
  }catch(e){console.warn('Firebase init falló',e);return false;}
}
function groupRef(){return db.collection('groups').doc(groupCode());}
function cloudPushTournament(t){if(cloudOn&&db)groupRef().collection('tournaments').doc(t.id).set(t).catch(e=>console.warn(e));}
function cloudDeleteTournament(id){if(cloudOn&&db)groupRef().collection('tournaments').doc(id).delete().catch(e=>console.warn(e));}
function cloudPushRoster(){if(cloudOn&&db)groupRef().collection('meta').doc('roster').set({list:loadRoster()}).catch(e=>console.warn(e));}
function cloudRefresh(){
  if(document.activeElement&&document.activeElement.tagName==='INPUT')return; // no interrumpir si está escribiendo
  if(screen==='home')renderHome();
  else if(screen==='ranking')renderRanking();
  else if(screen==='roster')renderRoster();
  else if(screen==='sync')renderSync();
  else if(screen==='tournament'&&current){const t=loadAll().find(x=>x.id===current.id);if(t){current=t;renderTournament();}}
}
function cloudListen(){
  cloudUnsub.forEach(u=>{try{u();}catch(e){}});cloudUnsub=[];
  const g=groupRef();
  cloudUnsub.push(g.collection('meta').doc('roster').onSnapshot(s=>{
    if(s.exists&&s.data().list){saveRoster(s.data().list);cloudRefresh();}
  },e=>console.warn(e)));
  cloudUnsub.push(g.collection('tournaments').onSnapshot(s=>{
    const list=loadAll();let changed=false;
    s.docChanges().forEach(ch=>{
      const t=ch.doc.data(),i=list.findIndex(x=>x.id===t.id);
      if(ch.type==='removed'){if(i>=0){list.splice(i,1);changed=true;}}
      else{if(i>=0)list[i]=t;else list.push(t);changed=true;}
    });
    if(changed){list.sort((a,b)=>b.createdAt-a.createdAt);saveAll(list);cloudRefresh();}
  },e=>console.warn(e)));
}
function cloudConnect(){ // al arrancar: solo escuchar (la nube manda)
  if(!groupCode()||!cloudInit()){cloudOn=false;return;}
  cloudOn=true;cloudListen();
}
async function cloudJoin(code){ // al conectarse desde el menú: fusiona lo local y sube
  localStorage.setItem(GROUP_KEY,code);
  if(!cloudInit()){cloudOn=false;return false;}
  cloudOn=true;
  try{
    const g=groupRef();
    const rs=await g.collection('meta').doc('roster').get();
    const remoteRoster=(rs.exists&&rs.data().list)?rs.data().list:[];
    const localRoster=loadRoster(),merged=[...remoteRoster],idMap={};
    localRoster.forEach(lp=>{
      const m=merged.find(rp=>(rp.name||'').trim().toLowerCase()===(lp.name||'').trim().toLowerCase());
      if(m)idMap[lp.id]=m.id; else{merged.push(lp);idMap[lp.id]=lp.id;}
    });
    const localT=loadAll();
    localT.forEach(t=>{if(t.playerIds)t.playerIds=t.playerIds.map(id=>idMap[id]||id);});
    saveRoster(merged);saveAll(localT);
    await g.collection('meta').doc('roster').set({list:merged});
    for(const t of localT){await g.collection('tournaments').doc(t.id).set(t);}
  }catch(e){console.warn('join merge',e);}
  cloudListen();return true;
}
function cloudDisconnect(){
  cloudUnsub.forEach(u=>{try{u();}catch(e){}});cloudUnsub=[];
  cloudOn=false;localStorage.removeItem(GROUP_KEY);
}

/* ============ ESTADO / NAVEGACIÓN ============ */
let current=null; // torneo abierto
let activeTab='rondas';
let screen='home'; // vista actual (para refrescar al recibir cambios de la nube)
const app=document.getElementById('app');
const titleEl=document.getElementById('title');
const backBtn=document.getElementById('backBtn');

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}
function esc(s){return(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ============ VENTANA MODAL (confirmar / pedir texto) ============ */
function modalConfirm(msg,cb){
  const m=document.getElementById('modal');
  document.getElementById('modalMsg').textContent=msg;
  document.getElementById('modalInput').style.display='none';
  document.getElementById('modalOk').onclick=()=>{m.style.display='none';cb(true);};
  m.style.display='flex';
}
function modalPrompt(msg,val,cb){
  const m=document.getElementById('modal');
  document.getElementById('modalMsg').textContent=msg;
  const inp=document.getElementById('modalInput');
  inp.style.display='block';inp.value=val||'';
  document.getElementById('modalOk').onclick=()=>{m.style.display='none';cb(inp.value);};
  m.style.display='flex';setTimeout(()=>inp.focus(),50);
}
function modalCancel(){document.getElementById('modal').style.display='none';}

function goHome(){current=null;backBtn.style.display='none';titleEl.textContent='Americano Pádel';renderHome();}

/* ============ VISTA: INICIO ============ */
function renderHome(){
  screen='home';
  const list=loadAll();
  let html=`<button class="btn" onclick="renderNew()">➕ Nuevo torneo</button>`;
  if(list.length||loadRoster().length){
    html+=`<div class="row" style="margin-top:10px">
      <button class="btn secondary" onclick="renderRanking()">🏅 Ranking</button>
      <button class="btn secondary" onclick="renderRoster()">👥 Jugadores</button></div>`;
  }
  html+=`<button class="btn secondary" onclick="renderSync()" style="margin-top:10px">☁️ ${cloudOn?'Sincronizado · '+esc(groupCode()):'Sincronizar entre teléfonos'}</button>`;
  if(list.length===0){
    html+=`<div class="empty"><div class="big">🎾</div><div>Todavía no tienes torneos.</div><div class="muted">Crea el primero arriba.</div></div>`;
  }else{
    html+=`<h2>Tus torneos</h2><div class="card tlist">`;
    list.forEach((t,i)=>{
      const done=t.schedule.flatMap(r=>r.matches).filter(m=>m.scoreA!=null).length;
      const total=t.schedule.flatMap(r=>r.matches).length;
      html+=`<div class="titem" onclick="openTournament('${t.id}')" ${i<list.length-1?'style="border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:12px"':''}>
        <span class="ic">🏆</span>
        <div class="meta"><div class="nm">${esc(t.name)}</div>
        <div class="sub">${t.numPlayers} jugadores · ${done}/${total} partidos · ${new Date(t.createdAt).toLocaleDateString('es')}</div></div>
        <button class="chip-sel" style="margin:0" onclick="event.stopPropagation();deleteTournamentConfirm('${t.id}')">🗑️</button></div>`;
    });
    html+=`</div>`;
  }
  app.innerHTML=html;
}

/* ============ VISTA: NUEVO TORNEO ============ */
let selectedIds=[];
function renderNew(){
  screen='new';
  backBtn.style.display='block';titleEl.textContent='Nuevo torneo';
  selectedIds=[];
  app.innerHTML=`
  <div class="card">
    <label>Nombre del torneo</label>
    <input id="tName" placeholder="Ej: Americano del sábado" value="Americano ${new Date().toLocaleDateString('es')}"/>
    <div class="row">
      <div><label>Puntos por partido</label><input id="tPoints" type="number" inputmode="numeric" value="24"/></div>
      <div><label>Rondas</label><input id="tRounds" type="number" inputmode="numeric" value="7"/></div>
    </div>
    <p class="muted" id="hint" style="margin-top:10px"></p>
  </div>
  <div class="card">
    <h2 style="margin-top:0">Jugadores del torneo</h2>
    <p class="muted" id="selCount"></p>
    <div id="chips"></div>
    <label>Agregar jugador nuevo</label>
    <div class="row">
      <input id="newPlayer" placeholder="Nombre" onkeydown="if(event.key==='Enter')addNewPlayerToRoster()"/>
      <button class="btn secondary" style="margin-top:0;max-width:110px" onclick="addNewPlayerToRoster()">Agregar</button>
    </div>
  </div>
  <button class="btn" onclick="doGenerate()">⚙️ Generar fixture</button>`;
  renderChips();
}
function renderChips(){
  const roster=loadRoster(),chips=document.getElementById('chips');
  if(!roster.length)chips.innerHTML=`<p class="muted">Aún no hay jugadores guardados. Agrégalos abajo 👇</p>`;
  else chips.innerHTML=roster.map(p=>{
    const on=selectedIds.includes(p.id);
    return `<button type="button" class="chip-sel${on?' on':''}" onclick="toggleSel('${p.id}')">${on?'✓ ':''}${esc(p.name)}</button>`;
  }).join('');
  updateSelUI();
}
function toggleSel(id){
  const i=selectedIds.indexOf(id);
  if(i>=0)selectedIds.splice(i,1);
  else{if(selectedIds.length>=12){toast('Máximo 12 jugadores');return;}selectedIds.push(id);}
  renderChips();
}
function updateSelUI(){
  const n=selectedIds.length;
  document.getElementById('selCount').innerHTML=`Seleccionados: <b>${n}</b>`+(n<4?' — faltan, mínimo 4':n>12?' — máximo 12':'');
  if(n>=4&&n<=12){
    document.getElementById('tPoints').value=defaultPoints(n);
    document.getElementById('tRounds').value=defaultRounds(n);
    const courts=Math.floor(n/4),sit=n-courts*4;
    document.getElementById('hint').innerHTML=`Cada ronda: <b>${courts}</b> cancha(s), <b>${sit}</b> en descanso. `+
      (n===9?'Todos descansan 1 vez y juegas con cada quien una vez. 👌':
       n===8?'Nadie descansa y juegas con cada compañero una vez. 👌':'');
  }else document.getElementById('hint').innerHTML='Toca los nombres para elegir entre 4 y 12 jugadores.';
}
function addNewPlayerToRoster(){
  const inp=document.getElementById('newPlayer'),nm=inp.value.trim();
  if(!nm)return;
  const p=addRosterPlayer(nm);inp.value='';inp.focus();
  if(p&&!selectedIds.includes(p.id)&&selectedIds.length<12)selectedIds.push(p.id);
  renderChips();
}
function doGenerate(){
  const n=selectedIds.length;
  if(n<4||n>12){toast('Selecciona entre 4 y 12 jugadores');return;}
  const roster=loadRoster();
  const chosen=selectedIds.map(id=>roster.find(p=>p.id===id)).filter(Boolean);
  const players=chosen.map(p=>p.name),playerIds=chosen.map(p=>p.id);
  const pts=+document.getElementById('tPoints').value||defaultPoints(n);
  const rounds=+document.getElementById('tRounds').value||defaultRounds(n);
  const name=document.getElementById('tName').value.trim()||'Americano';
  toast('Generando fixture balanceado…');
  setTimeout(()=>{
    const{schedule}=generateSchedule(n,rounds,{restarts:5000});
    const t={id:'t'+Date.now(),name,createdAt:Date.now(),numPlayers:n,players,playerIds,pointsPerMatch:pts,numRounds:rounds,schedule};
    saveTournament(t);openTournament(t.id);
  },30);
}

/* ============ VISTA: TORNEO ============ */
function openTournament(id){
  current=loadAll().find(t=>t.id===id);if(!current)return goHome();
  backBtn.style.display='block';titleEl.textContent=current.name;activeTab='rondas';renderTournament();
}
function renderTournament(){
  screen='tournament';
  app.innerHTML=`
  <div class="tabs">
    <button class="${activeTab==='rondas'?'active':''}" onclick="setTab('rondas')">Rondas</button>
    <button class="${activeTab==='tabla'?'active':''}" onclick="setTab('tabla')">Posiciones</button>
  </div>
  <div id="tabContent"></div>`;
  activeTab==='rondas'?renderRondas():renderTabla();
}
function setTab(t){activeTab=t;renderTournament();}

function pname(i){return current.players[i];}
function renderRondas(){
  const c=document.getElementById('tabContent');let h='';
  current.schedule.forEach((rd,ri)=>{
    const restNames=rd.resting.map(pname).join(', ');
    h+=`<div class="round-h"><span class="num">${ri+1}</span><span class="ttl">Ronda ${ri+1}</span>
      ${rd.resting.length?`<span class="rest">😴 Descansa: ${esc(restNames)}</span>`:''}</div>`;
    rd.matches.forEach((m,mi)=>{
      const aWin=m.scoreA!=null&&m.scoreA>m.scoreB, bWin=m.scoreB!=null&&m.scoreB>m.scoreA;
      h+=`<div class="match"><div class="court">🏟️ Cancha ${mi+1}</div>
        <div class="team ${aWin?'win':''}"><span class="names">${esc(pname(m.teamA[0]))} & ${esc(pname(m.teamA[1]))}</span>
          <span class="sc"><input type="number" inputmode="numeric" value="${m.scoreA??''}" placeholder="–"
            onchange="setScore(${ri},${mi},'A',this.value)"/></span></div>
        <div class="vs">VS · suma ${current.pointsPerMatch}</div>
        <div class="team ${bWin?'win':''}"><span class="names">${esc(pname(m.teamB[0]))} & ${esc(pname(m.teamB[1]))}</span>
          <span class="sc"><input type="number" inputmode="numeric" value="${m.scoreB??''}" placeholder="–"
            onchange="setScore(${ri},${mi},'B',this.value)"/></span></div></div>`;
    });
  });
  h+=`<button class="btn wa" onclick="shareFixture()">📤 Compartir fixture por WhatsApp</button>`;
  c.innerHTML=h;
}
function setScore(ri,mi,team,val){
  const m=current.schedule[ri].matches[mi];const total=current.pointsPerMatch;
  if(val===''){m.scoreA=null;m.scoreB=null;}
  else{let v=Math.max(0,Math.min(total,parseInt(val)||0));
    if(team==='A'){m.scoreA=v;m.scoreB=total-v;}else{m.scoreB=v;m.scoreA=total-v;}}
  saveTournament(current);renderRondas();
}

function computeStandings(t){
  t=t||current;
  const st=t.players.map((nm,i)=>({i,name:nm,pts:0,pf:0,pa:0,pj:0}));
  t.schedule.forEach(rd=>rd.matches.forEach(m=>{
    if(m.scoreA==null)return;
    for(const p of m.teamA){st[p].pts+=m.scoreA;st[p].pf+=m.scoreA;st[p].pa+=m.scoreB;st[p].pj++;}
    for(const p of m.teamB){st[p].pts+=m.scoreB;st[p].pf+=m.scoreB;st[p].pa+=m.scoreA;st[p].pj++;}
  }));
  st.forEach(s=>s.dif=s.pf-s.pa);
  st.sort((a,b)=>b.pts-a.pts||b.dif-a.dif||a.name.localeCompare(b.name));
  return st;
}
function renderTabla(){
  const c=document.getElementById('tabContent');const st=computeStandings();
  let h=`<div class="card" style="padding:0;overflow:hidden"><table><thead><tr>
    <th class="n">#</th><th>Jugador</th><th style="text-align:center">PJ</th>
    <th style="text-align:right">Puntos</th><th style="text-align:right">Dif</th></tr></thead><tbody>`;
  st.forEach((s,i)=>{
    const cls=i===0?'top1':i===1?'top2':i===2?'top3':'';
    const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
    h+=`<tr class="${cls}"><td class="n">${medal}</td><td>${esc(s.name)}</td>
      <td style="text-align:center">${s.pj}</td><td class="pts">${s.pts}</td>
      <td class="dif">${s.dif>=0?'+':''}${s.dif}</td></tr>`;
  });
  h+=`</tbody></table></div>
    <p class="muted center">Desempate por diferencia de puntos (a favor − en contra).</p>
    <button class="btn wa" onclick="shareStandings()">📤 Compartir posiciones por WhatsApp</button>
    <button class="btn danger" onclick="confirmDelete()">🗑️ Eliminar torneo</button>`;
  c.innerHTML=h;
}
function confirmDelete(){modalConfirm('¿Eliminar este torneo? No se puede deshacer.',()=>{deleteTournament(current.id);goHome();});}
function deleteTournamentConfirm(id){
  const t=loadAll().find(x=>x.id===id);
  modalConfirm('¿Eliminar el torneo "'+(t?t.name:'')+'"?\nNo se puede deshacer.',()=>{deleteTournament(id);renderHome();});
}

/* ============ COMPARTIR ============ */
function share(text){
  if(navigator.share){navigator.share({text}).catch(()=>{});}
  else{window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');}
}
function shareStandings(){
  const st=computeStandings();
  let t=`🎾 *${current.name}* — Posiciones\n\n`;
  st.forEach((s,i)=>{const m=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
    t+=`${m} ${s.name} — *${s.pts}* pts (${s.dif>=0?'+':''}${s.dif})\n`;});
  t+=`\nGenerado con Americano Pádel`;share(t);
}
function shareFixture(){
  let t=`🎾 *${current.name}* — Fixture\n${current.numPlayers} jugadores · suma ${current.pointsPerMatch} por partido\n`;
  current.schedule.forEach((rd,ri)=>{
    t+=`\n*Ronda ${ri+1}*\n`;
    rd.matches.forEach((m,mi)=>{t+=`🏟️ ${pname(m.teamA[0])} & ${pname(m.teamA[1])}  vs  ${pname(m.teamB[0])} & ${pname(m.teamB[1])}\n`;});
    if(rd.resting.length)t+=`😴 Descansa: ${rd.resting.map(pname).join(', ')}\n`;
  });
  share(t);
}

/* ============ VISTA: RANKING (estilo FIP, histórico) ============ */
function renderRanking(){
  screen='ranking';current=null;backBtn.style.display='block';titleEl.textContent='Ranking';
  const rk=computeRanking();
  const incompletos=loadAll().filter(t=>t.playerIds&&!isComplete(t)).length;
  let h='';
  if(!rk.length){
    h=`<div class="empty"><div class="big">🏅</div><div>Aún no hay torneos terminados.</div>
      <div class="muted">El ranking cuenta los torneos con todos los partidos completados.</div></div>`;
    if(incompletos)h+=`<p class="muted center">⏳ Tienes ${incompletos} torneo(s) sin terminar. Completa todos los puntajes para que sumen.</p>`;
  }else{
    h=`<div class="card" style="padding:0;overflow:hidden"><table><thead><tr>
      <th class="n">#</th><th>Jugador</th><th style="text-align:center">🏆</th>
      <th style="text-align:center">T</th><th style="text-align:right">Puntos</th></tr></thead><tbody>`;
    rk.forEach((s,i)=>{
      const cls=i===0?'top1':i===1?'top2':i===2?'top3':'';
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
      h+=`<tr class="${cls}" onclick="togglePlayerDetail('${s.id}')" style="cursor:pointer">
        <td class="n">${medal}</td><td>${esc(s.name)} <span class="muted">›</span></td>
        <td style="text-align:center">${s.titles||'–'}</td>
        <td style="text-align:center">${s.tournaments}</td>
        <td class="pts">${Math.round(s.pts*10)/10}</td></tr>
        <tr id="det-${s.id}" style="display:none"><td></td><td colspan="4" style="padding-top:0">${playerDetailHtml(s)}</td></tr>`;
    });
    h+=`</tbody></table></div>
      <p class="muted center">T = torneos jugados · 🏆 = títulos (1er lugar). Toca un jugador para ver su detalle.</p>`;
    if(incompletos)h+=`<p class="muted center">⏳ ${incompletos} torneo(s) sin terminar aún no cuentan.</p>`;
    h+=`<button class="btn wa" onclick="shareRanking()">📤 Compartir ranking por WhatsApp</button>`;
  }
  app.innerHTML=h;
}
function playerDetailHtml(s){
  const r=[...s.results].sort((a,b)=>b.date-a.date);
  return `<div style="font-size:12px;color:var(--muted);padding:2px 0 8px">`+
    r.map(x=>`${new Date(x.date).toLocaleDateString('es')} · ${esc(x.name)} — <b style="color:var(--txt)">${x.position}º</b> de ${x.np} · +${x.posPoints} pts`).join('<br>')+
    `</div>`;
}
function togglePlayerDetail(id){const el=document.getElementById('det-'+id);if(el)el.style.display=el.style.display==='none'?'table-row':'none';}
function shareRanking(){
  const rk=computeRanking();
  let t=`🏅 *Ranking Americano* (estilo FIP)\n\n`;
  rk.forEach((s,i)=>{const m=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}.`;
    t+=`${m} ${s.name} — *${Math.round(s.pts*10)/10}* pts · ${s.tournaments} torneos${s.titles?` · ${s.titles}🏆`:''}\n`;});
  t+=`\nGenerado con Americano Pádel`;share(t);
}

/* ============ VISTA: JUGADORES (roster) ============ */
function renderRoster(){
  screen='roster';current=null;backBtn.style.display='block';titleEl.textContent='Jugadores';
  const roster=loadRoster();
  let h=`<div class="card">
    <label>Agregar jugador</label>
    <div class="row">
      <input id="rosterNew" placeholder="Nombre" onkeydown="if(event.key==='Enter')rosterAdd()"/>
      <button class="btn secondary" style="margin-top:0;max-width:110px" onclick="rosterAdd()">Agregar</button>
    </div>
  </div>`;
  if(!roster.length)h+=`<div class="empty"><div class="big">👥</div><div>Aún no hay jugadores guardados.</div></div>`;
  else{
    h+=`<div class="card">`;
    roster.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach((p,i,arr)=>{
      const used=playerUsed(p.id);
      h+=`<div class="titem" style="${i<arr.length-1?'border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:10px':''}">
        <span class="ic">🎾</span>
        <div class="meta"><div class="nm">${esc(p.name)}</div>
          <div class="sub">${used?'Ha jugado torneos':'Sin torneos aún'}</div></div>
        <button class="chip-sel" onclick="rosterRename('${p.id}')">✏️</button>
        <button class="chip-sel" onclick="rosterDelete('${p.id}')">🗑️</button>
      </div>`;
    });
    h+=`</div>`;
  }
  app.innerHTML=h;
}
function rosterAdd(){const inp=document.getElementById('rosterNew'),nm=inp.value.trim();if(!nm)return;addRosterPlayer(nm);inp.value='';inp.focus();renderRoster();}
function rosterRename(id){const p=loadRoster().find(x=>x.id===id);if(!p)return;modalPrompt('Nuevo nombre para "'+p.name+'":',p.name,nm=>{if(nm&&nm.trim()){renameRosterPlayer(id,nm);renderRoster();}});}
function rosterDelete(id){
  const p=loadRoster().find(x=>x.id===id);if(!p)return;
  const msg=playerUsed(id)
    ? 'Este jugador aparece en torneos guardados.\nSi lo eliminas, se quita de la lista y del ranking (los torneos antiguos conservan su registro).\n\n¿Eliminar a "'+p.name+'"?'
    : '¿Eliminar a "'+p.name+'"?';
  modalConfirm(msg,()=>{deleteRosterPlayer(id);renderRoster();});
}

/* ============ VISTA: SINCRONIZACIÓN ============ */
function renderSync(){
  screen='sync';current=null;backBtn.style.display='block';titleEl.textContent='Sincronización';
  const code=groupCode();
  if(!cloudReady()){
    app.innerHTML=`<div class="card">
      <div class="center" style="font-size:40px">☁️</div>
      <p>La sincronización todavía no está configurada en esta versión.</p>
      <p class="muted">Falta pegar la configuración de Firebase. Cuando esté lista, aquí podrás crear o unirte a un grupo.</p>
    </div>`;return;
  }
  let h;
  if(code&&cloudOn){
    h=`<div class="card center">
      <div style="font-size:42px">☁️✅</div>
      <p style="margin:6px 0 2px">Conectado al grupo</p>
      <p style="font-size:24px;font-weight:800;letter-spacing:2px;color:var(--accent)">${esc(code)}</p>
      <p class="muted">Todos los que usen este mismo código comparten los torneos y el ranking, en tiempo real.</p>
      <button class="btn wa" onclick="shareGroupCode()">📤 Invitar al grupo</button>
      <button class="btn danger" onclick="doDisconnect()">Desconectar este teléfono</button>
    </div>`;
  }else{
    h=`<div class="card">
      <p>Comparte tus torneos y el ranking entre varios teléfonos con un <b>código de grupo</b>.</p>
      <label>Código del grupo</label>
      <input id="grpCode" placeholder="Ej: MOLINOS2026" value="${esc(code)}" autocapitalize="characters" autocorrect="off"/>
      <p class="muted">Inventa un código y compártelo con tus amigos, o escribe el de tu grupo para unirte.</p>
      <button class="btn" onclick="doConnect()">Conectar</button>
    </div>`;
  }
  app.innerHTML=h;
}
function doConnect(){
  const v=(document.getElementById('grpCode').value||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
  if(v.length<3){toast('El código debe tener al menos 3 caracteres');return;}
  toast('Conectando…');
  cloudJoin(v).then(ok=>{ok?(toast('¡Conectado!'),renderSync()):toast('No se pudo conectar');});
}
function doDisconnect(){
  modalConfirm('¿Desconectar este teléfono del grupo?\nTus torneos quedan guardados localmente.',()=>{cloudDisconnect();renderSync();});
}
function shareGroupCode(){
  share(`🎾 Únete a nuestro grupo de Pádel Americano:\n\n1) Abre: ${location.origin}${location.pathname}\n2) Entra a ☁️ Sincronizar\n3) Escribe el código: *${groupCode()}*`);
}

/* ============ ARRANQUE ============ */
migrate();
cloudConnect();
goHome();
if('serviceWorker'in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
  let _reloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(!_reloaded){_reloaded=true;location.reload();}
  });
}
</script>
